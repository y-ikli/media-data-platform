version: 2

models:
  - name: stg_meta_ads__campaign_daily
    description: >
      Staging model for Meta Ads (Facebook/Instagram) campaign daily performance data.
      Standardizes raw data with consistent naming. KPIs are not computed here —
      they are calculated in the marts layer. Note: conversions is not available
      from the Meta Ads API and is handled as null in the intermediate layer.

    columns:
      - name: report_date
        description: Date of the performance metrics
        tests:
          - not_null

      - name: campaign_id
        description: Unique identifier for the campaign
        tests:
          - not_null

      - name: campaign_name
        description: Human-readable campaign name

      - name: impressions
        description: Number of times ads were displayed
        tests:
          - not_null

      - name: clicks
        description: Number of clicks on ads
        tests:
          - not_null

      - name: spend_usd
        description: Total advertising spend in USD
        tests:
          - not_null

      - name: likes
        description: Number of likes/reactions on ads

      - name: comments
        description: Number of comments on ads

      - name: shares
        description: Number of shares of ads

      - name: video_views
        description: Number of video views

      - name: page_engagement
        description: Total page engagement actions

      - name: ingested_at
        description: Timestamp when data was ingested into raw layer

      - name: extract_run_id
        description: Unique identifier for the extraction run

      - name: source
        description: Source identifier (always meta_ads)