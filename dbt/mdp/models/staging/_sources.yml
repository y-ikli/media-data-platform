version: 2

sources:
  - name: raw_google_ads
    description: Raw Google Ads data ingested from fake API
    database: "{{ var('gcp_project') }}"
    schema: "{{ var('raw_dataset') }}"
    tables:
      - name: google_ads_campaign_daily
        description: Daily campaign-level performance metrics from Google Ads
        columns:
          - name: date
            description: Date of performance metrics
            tests:
              - not_null
          - name: campaign_id
            description: Unique campaign identifier
            tests:
              - not_null
          - name: campaign_name
            description: Campaign name
          - name: impressions
            description: Number of impressions
          - name: clicks
            description: Number of clicks
          - name: conversions
            description: Number of conversions
          - name: cost_usd
            description: Amount spent in USD
          - name: ingested_at
            description: Timestamp of ingestion
          - name: extract_run_id
            description: Unique run identifier
          - name: source
            description: Source identifier

  - name: raw_meta_ads
    description: Raw Meta Ads (Facebook/Instagram) data ingested from real API
    database: "{{ var('gcp_project') }}"
    schema: "{{ var('raw_dataset') }}"
    tables:
      - name: meta_ads_campaign_daily
        description: Daily campaign-level performance metrics from Meta Ads
        columns:
          - name: date
            description: Date of performance metrics
            tests:
              - not_null
          - name: campaign_id
            description: Unique campaign identifier
            tests:
              - not_null
          - name: campaign_name
            description: Campaign name
          - name: impressions
            description: Number of impressions
          - name: clicks
            description: Number of clicks
          - name: conversions
            description: Number of conversions
          - name: spend_usd
            description: Amount spent in USD
          - name: likes
            description: Number of likes/reactions
          - name: comments
            description: Number of comments
          - name: shares
            description: Number of shares
          - name: ingested_at
            description: Timestamp of ingestion
          - name: extract_run_id
            description: Unique run identifier
          - name: source
            description: Source identifier